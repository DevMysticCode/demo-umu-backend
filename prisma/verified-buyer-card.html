<!--
  Verified buyer card — logged-in / already-verified state.
  Replace {{firstName}} with the buyer's first name, and wire the two
  buttons to your profile routes (data-action attributes provided).
-->
<div class="vb-card">
  <div class="vb-badge">
    <span class="vb-badge__icon" aria-hidden="true">&#x1F6E1;</span>
    <span>VERIFIED BUYER</span>
    <span class="vb-badge__sep">&middot;</span>
    <span class="vb-badge__active">ACTIVE</span>
  </div>

  <h2 class="vb-title">Welcome back, {{firstName}}.</h2>
  <p class="vb-lede">You're verified and viewing-ready. Here's what that gets you.</p>

  <div class="vb-benefit">
    <span class="vb-benefit__icon vb-benefit__icon--amber" aria-hidden="true">&uarr;</span>
    <div>
      <div class="vb-benefit__head">First in the queue</div>
      <div class="vb-benefit__sub">Owners see verified buyers first when choosing who to sell to.</div>
    </div>
  </div>

  <div class="vb-benefit">
    <span class="vb-benefit__icon vb-benefit__icon--teal" aria-hidden="true">&check;</span>
    <div>
      <div class="vb-benefit__head">Passport unlocked &mdash; free on day one</div>
      <div class="vb-benefit__sub">It's yours free when you start viewing &mdash; no &pound;35 charge.</div>
    </div>
  </div>

  <button type="button" class="vb-btn vb-btn--primary" data-action="view-buyer-profile">
    Take me to my buyer profile &rarr;
  </button>
  <button type="button" class="vb-btn vb-btn--ghost" data-action="edit-buyer-profile">
    Edit my buyer profile
  </button>
</div>

<style>
  .vb-card {
    box-sizing: border-box;
    max-width: 560px;
    background: #221d44;
    border-radius: 16px;
    padding: 24px;
    color: #e9e7f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .vb-card * { box-sizing: border-box; }

  .vb-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    letter-spacing: 1px;
    font-weight: 500;
    color: #c9c4e8;
    margin-bottom: 16px;
  }
  .vb-badge__icon { font-size: 16px; }
  .vb-badge__sep { color: #6f689c; }
  .vb-badge__active { color: #5dcaa5; }

  .vb-title {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
    margin: 0 0 6px;
  }
  .vb-lede {
    font-size: 15px;
    line-height: 1.6;
    color: #c4bfe0;
    margin: 0 0 20px;
  }

  .vb-benefit {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    background: #2c2657;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .vb-benefit:last-of-type { margin-bottom: 20px; }
  .vb-benefit__icon {
    font-size: 18px;
    line-height: 1.3;
    flex: 0 0 auto;
  }
  .vb-benefit__icon--amber { color: #f0b84a; }
  .vb-benefit__icon--teal  { color: #5dcaa5; }
  .vb-benefit__head { font-size: 14px; font-weight: 500; color: #ffffff; }
  .vb-benefit__sub  { font-size: 13px; color: #b3aed6; line-height: 1.5; }

  .vb-btn {
    width: 100%;
    font-size: 16px;
    font-weight: 500;
    padding: 16px;
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity .15s ease, background .15s ease;
  }
  .vb-btn:last-child { margin-bottom: 0; }
  .vb-btn--primary {
    border: none;
    background: #0f9e78;
    color: #ffffff;
  }
  .vb-btn--primary:hover { background: #0d8a69; }
  .vb-btn--ghost {
    border: 0.5px solid #4a4480;
    background: transparent;
    color: #d8d4ef;
    font-size: 15px;
    padding: 13px;
  }
  .vb-btn--ghost:hover { background: #2c2657; }
</style>
